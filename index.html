<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>i3dscsys</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>.hidden{display:none!important}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>(function(){var l=document.createElement('link');l.rel='stylesheet';l.href='css/styles.css?v='+Date.now();document.head.appendChild(l);})()</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
  <div id="startup-curtain"></div>
  <header class="topbar">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>i3dscsys</h1>
    <div id="user-area"></div>
  </header>

  <nav id="app-nav" class="app-nav hidden">
    <button data-sec="sec-dashboard">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Início
    </button>
    <button data-sec="sec-filaments-register">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Filamento
    </button>
    <button data-sec="sec-filaments-list">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>
      Estoque
    </button>
    <button data-sec="sec-sales-register">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Vender
    </button>
    <button data-sec="sec-sales-list">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Vendas
    </button>
    <button data-sec="sec-products">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Catálogo
    </button>
    <button data-sec="sec-orders">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Pedidos
    </button>
  </nav>

  <main id="app" class="hidden">

    <!-- 0. Dashboard -->
    <section id="sec-dashboard" class="section hidden">
      <div class="dash-greeting" id="dash-greeting"></div>
      <div class="period-tabs" id="dash-period">
        <button data-period="hoje" type="button">Hoje</button>
        <button data-period="semana" type="button">Semana</button>
        <button data-period="mes" type="button">Mês</button>
        <button data-period="total" type="button" class="active">Total</button>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div id="low-stock-alert"></div>
      <div class="card" style="margin-top:14px">
        <p class="dash-subtitle">Últimas vendas</p>
        <div id="recent-sales-list"></div>
      </div>
    </section>

    <!-- 1. Cadastrar Filamento: apenas o formulário -->
    <section id="sec-filaments-register" class="card section hidden">
      <h2>Cadastrar Filamento</h2>
      <form id="filament-form">
        <input name="name" placeholder="Nome (ex: PLA Branco)" required>
        <input name="color" placeholder="Cor (ex: Branco)" required>
        <input name="manufacturer" placeholder="Fabricante" required>
        <input name="quantity" type="number" step="0.01" placeholder="Quantidade inicial (g)" required>
        <label style="color:var(--muted);font-size:14px">Foto (opcional)</label>
        <input name="photo" type="file" accept="image/*" multiple>
        <button type="submit">Salvar Filamento</button>
      </form>
    </section>

    <!-- 2. Consultar Filamentos: apenas a lista -->
    <section id="sec-filaments-list" class="card section hidden">
      <h2>Filamentos em Estoque</h2>
      <input id="filaments-search" type="search" class="search-box" placeholder="Buscar filamento…">
      <div id="filaments-list" class="list"></div>
    </section>

    <!-- 3. Registrar Venda: apenas o formulário -->
    <section id="sec-sales-register" class="card section hidden">
      <h2>Registrar Venda</h2>
      <form id="sale-form">
        <input name="product_name" placeholder="Nome do produto" required>
        <input name="price" type="number" step="0.01" placeholder="Preço (BRL)" required>
        <label style="color:var(--muted);font-size:14px">Foto do produto (opcional)</label>
        <input name="product_photo" type="file" accept="image/*" multiple>
        <textarea name="notes" placeholder="Observações (opcional)" rows="2"></textarea>
        <label style="color:var(--muted);font-size:14px;margin-top:8px">Filamentos usados</label>
        <div id="usage-items"></div>
        <button type="submit">Registrar Venda</button>
        <button type="button" id="save-as-order">Salvar como Encomenda</button>
      </form>
    </section>

    <!-- 4. Consultar Vendas: apenas a lista -->
    <section id="sec-sales-list" class="card section hidden">
      <h2>Histórico de Vendas</h2>
      <input id="sales-search" type="search" class="search-box" placeholder="Buscar venda…">
      <div class="view-toggle">
        <button id="sales-view-list" type="button" class="active">Lista</button>
        <button id="sales-view-table" type="button">Tabela</button>
      </div>
      <div id="sales-list" class="list"></div>
      <div id="sales-table" style="display:none;overflow:auto;"></div>
    </section>

    <!-- 5. Catálogo de Produtos -->
    <section id="sec-products" class="card section hidden">
      <h2>Catálogo de Produtos</h2>
      <button id="product-form-toggle" type="button" class="btn-ghost" style="width:100%;margin-bottom:12px">+ Cadastrar produto</button>
      <div id="product-form-wrap" class="hidden" style="margin-bottom:16px">
        <form id="product-form">
          <input name="prod_name" placeholder="Nome do produto" required>
          <input name="prod_price" type="number" step="0.01" placeholder="Preço (R$)" required>
          <label style="color:var(--muted);font-size:13px;margin-top:4px">Foto (opcional)</label>
          <input name="prod_photo" type="file" accept="image/*" multiple>
          <label style="color:var(--muted);font-size:13px;margin-top:8px">Filamentos utilizados (apenas para exibição)</label>
          <div id="product-usage-items"></div>
          <button type="submit" id="product-form-submit" style="margin-top:8px">Salvar produto</button>
        </form>
      </div>
      <input id="products-search" type="search" class="search-box" placeholder="Buscar produto…">
      <div id="products-list" class="list"></div>
    </section>

    <!-- 6. Encomendas -->
    <section id="sec-orders" class="section hidden">
      <div class="card">
        <h2>Nova Encomenda</h2>
        <form id="order-form">
          <input name="product_name" placeholder="Nome do produto" required>
          <input name="price" type="number" step="0.01" placeholder="Preço estimado (BRL)" required>
          <textarea name="notes" rows="2" placeholder="Observações (opcional)"></textarea>
          <label style="color:var(--muted);font-size:14px;margin-top:8px">Filamentos necessários</label>
          <div id="order-usage-items"></div>
          <button type="submit">Criar Encomenda</button>
        </form>
      </div>
      <div class="card" style="margin-top:14px">
        <h2>Encomendas Pendentes</h2>
        <input id="orders-search" type="search" class="search-box" placeholder="Buscar encomenda…">
        <div id="orders-list"></div>
      </div>
    </section>

  </main>

  <div id="auth" class="auth hidden">
    <div class="auth-card">
      <div class="auth-logo-wrap">
        <img src="logo.png" alt="">
        <h2>i3dscsys</h2>
        <p>Gestão de impressão 3D</p>
      </div>
      <form id="auth-form">
        <input id="email" type="email" placeholder="Email" required>
        <input id="password" type="password" placeholder="Senha" required>
        <div class="auth-actions">
          <button id="sign-in" type="button">Entrar</button>
          <button id="sign-up" type="button">Criar conta</button>
        </div>
      </form>
    </div>
  </div>

  <div id="loading-overlay" class="hidden">
    <div class="loader"></div>
  </div>

  <div id="lightbox" class="hidden">
    <div id="lightbox-backdrop"></div>
    <div id="lightbox-content">
      <button id="lightbox-close">✕</button>
      <button id="lightbox-prev">‹</button>
      <img id="lightbox-img" src="" alt="">
      <button id="lightbox-next">›</button>
      <div id="lightbox-dots"></div>
    </div>
  </div>

  <!-- Modal de edição de filamento -->
  <div id="filament-edit-modal" class="modal-overlay hidden">
    <div class="modal-card card">
      <h3 class="modal-title">Editar Filamento</h3>
      <form id="filament-edit-form">
        <input id="edit-fil-name" placeholder="Nome (ex: PLA Branco)" required>
        <input id="edit-fil-color" placeholder="Cor (ex: Branco)" required>
        <input id="edit-fil-manufacturer" placeholder="Fabricante" required>
        <input id="edit-fil-quantity" type="number" step="0.01" placeholder="Quantidade atual (g)" required>
        <label style="color:var(--muted);font-size:13px;margin-top:4px">Nova foto (opcional — substitui a atual)</label>
        <input id="edit-fil-photo" type="file" accept="image/*" multiple>
        <div style="display:flex;gap:10px;margin-top:12px">
          <button type="submit" id="edit-fil-submit">Salvar</button>
          <button type="button" id="filament-edit-cancel" class="btn-ghost">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script>(function(){var s=document.createElement('script');s.src='js/app.js?v='+Date.now();document.body.appendChild(s);})()</script>
</body>
</html>
